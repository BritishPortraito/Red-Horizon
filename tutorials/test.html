<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello this works very well</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8cc80;
      --muted: #666;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.8s ease forwards 0.3s;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin: 1.2rem 0 0.6rem;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 1s ease forwards 0.55s;
    }

    .title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.8rem auto;
      opacity: 0;
      animation: fade 1s ease forwards 0.9s;
    }

    .sub {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: rise 0.8s ease forwards 1.1s;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 48px;
      height: 48px;
      opacity: 0;
      animation: fade 1.2s ease forwards 1.4s;
    }
    .corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* Floating dot */
    .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 0.5rem;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite 2s;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">
    <p class="label"><span class="dot"></span> confirmed <span class="dot"></span></p>
    <h1 class="title">hello this<br><em>works very well</em></h1>
    <div class="divider"></div>
    <p class="sub">and that is all that matters</p>
  </div>

</body>
</html>
